<div class="p-2 p-lg-4">
  <div class="d-flex justify-content-between align-items-center">
    <app-goods-inward-create [reference]="reference" (createDraft)="createDraftGoodsInward()" (submitCreation)="createGoodsInward($event)" class="ms-auto"></app-goods-inward-create>
  </div>
  <div class="mt-3">
    <table *ngIf="goodsInwards | async as goodsInwardData" class="table">
      <thead>
      <tr>
        <th scope="col">Réference</th>
        <th scope="col">Date</th>
        <th scope="col">Fournisseur</th>
        <th scope="col">Actions</th>
      </tr>
      </thead>
      <tbody *ngIf="goodsInwardCount > 0">
      <tr *ngFor="let item of goodsInwardData">
        <td class="text-decoration-underline" style="cursor:pointer" (click)="goodsInwardCreateComponent?.openUpdateModal(item)">{{item.reference}}</td>
        <td>{{item.creationDate}}</td>
        <td>{{item.provider.name}}</td>
        <td>

        </td>
      </tr>
      </tbody>
    </table>
    <app-placeholder [isLoading]="isLoading"></app-placeholder>
    <app-pagination [count]="goodsInwardCount" (selectPage)="changePage($event)"></app-pagination>
    <h6 class="d-flex mt-5 justify-content-center" *ngIf="goodsInwardCount === 0 && !isLoading">Aucun bon d'entré trouvé</h6>
  </div>
</div>
